<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Warble — Recorder (Online, Idle)</title>
<meta name="description" content="Main voice recorder screen, online and idle: prominent mic button, online status badge, language chips, and history entry point. Dark, offline-first PWA." />
<!--
  DESIGN SYSTEM (dark-only, matches reference speech-react)
  Bg slate-950 #020617 · cards #0f172a / #111a2e · borders #1e293b / #334155
  Primary indigo-600 #4f46e5 (hover #6366f1) · listening green-500 #22c55e
  connecting yellow-500 #eab308 · offline amber #f59e0b · stop/error red #ef4444
  Radii: cards rounded-2xl (16px), pills rounded-full · Mic button 64px circle
  Type scale: 11 / 13 / 15 / 20 / 34px · font system-ui (Inter-like)
  Layout: mobile-first 400px column, 20px gutters, vertical rhythm 16/24px
-->
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#020617;--card:#0f172a;--card2:#111a2e;--border:#1e293b;--border2:#334155;
    --indigo:#4f46e5;--indigo-hi:#6366f1;--green:#22c55e;--green-d:#4ade80;
    --yellow:#eab308;--red:#ef4444;--amber:#f59e0b;
    --white:#f8fafc;--t300:#cbd5e1;--t400:#94a3b8;--t500:#64748b;--t600:#475569;
  }
  html,body{height:100%}
  body{
    background:radial-gradient(120% 80% at 50% -10%,#0b1220 0%,var(--bg) 60%);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,sans-serif;
    color:var(--white);display:flex;align-items:center;justify-content:center;
    min-height:100vh;padding:32px 16px;-webkit-font-smoothing:antialiased;
  }
  .phone{
    width:100%;max-width:400px;min-height:800px;background:var(--bg);
    border:1px solid var(--border);border-radius:32px;overflow:hidden;
    box-shadow:0 40px 80px -20px rgba(0,0,0,.7);display:flex;flex-direction:column;
    position:relative;
  }
  .statusbar{display:flex;justify-content:space-between;align-items:center;
    padding:14px 22px 6px;font-size:12px;color:var(--t400);font-weight:600}
  .statusbar .dots{display:flex;gap:4px;align-items:center}
  .statusbar .dots span{width:4px;height:4px;border-radius:50%;background:var(--t500)}
  header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 6px}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .logo{width:34px;height:34px;border-radius:11px;
    background:linear-gradient(150deg,var(--indigo),#7c3aed);
    display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px -6px rgba(79,70,229,.7)}
  .brand h1{font-size:17px;font-weight:700;letter-spacing:-.02em}
  .brand .sub{font-size:11px;color:var(--t500);margin-top:1px;font-weight:500}
  .hgroup{display:flex;align-items:center;gap:8px}
  .iconbtn{width:38px;height:38px;border-radius:12px;border:1px solid var(--border);
    background:var(--card);color:var(--t400);display:flex;align-items:center;justify-content:center;cursor:pointer}
  .iconbtn:hover{border-color:var(--border2);color:var(--t300)}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:999px;
    font-size:12px;font-weight:600;border:1px solid}
  .badge.online{color:var(--green-d);background:rgba(34,197,94,.10);border-color:rgba(34,197,94,.30)}
  .badge .dot{width:7px;height:7px;border-radius:50%;background:var(--green);
    box-shadow:0 0 0 0 rgba(34,197,94,.6);animation:pulse 2s infinite}
  @keyframes pulse{0%{box-shadow:0 0 0 0 rgba(34,197,94,.5)}70%{box-shadow:0 0 0 7px rgba(34,197,94,0)}100%{box-shadow:0 0 0 0 rgba(34,197,94,0)}}
  .badgerow{padding:6px 20px 0;display:flex;justify-content:center}

  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px 24px 8px;gap:26px}
  .prompt{text-align:center;max-width:280px}
  .prompt h2{font-size:22px;font-weight:700;letter-spacing:-.02em;line-height:1.25}
  .prompt p{margin-top:8px;font-size:14px;line-height:1.5;color:var(--t500)}

  .micwrap{position:relative;display:flex;align-items:center;justify-content:center;width:200px;height:200px}
  .ring{position:absolute;border-radius:50%;border:1px solid rgba(99,102,241,.18)}
  .ring.r1{width:200px;height:200px}
  .ring.r2{width:150px;height:150px;border-color:rgba(99,102,241,.28)}
  .mic{position:relative;width:100px;height:100px;border-radius:50%;
    background:linear-gradient(160deg,var(--indigo-hi),var(--indigo));color:#fff;
    display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;
    box-shadow:0 18px 40px -10px rgba(79,70,229,.75),inset 0 1px 0 rgba(255,255,255,.25);
    transition:transform .15s ease}
  .mic:hover{transform:scale(1.04)}
  .mic:active{transform:scale(.96)}
  .mic-hint{font-size:13px;color:var(--t600);font-weight:500}

  .langs{display:flex;gap:10px;flex-wrap:wrap;justify-content:center}
  .chip{padding:9px 16px;border-radius:999px;font-size:13px;font-weight:600;cursor:pointer;
    border:1px solid var(--border);background:var(--card);color:var(--t400)}
  .chip.active{border-color:rgba(79,70,229,.55);background:rgba(79,70,229,.15);color:#c7d2fe}
  .chip .g{font-size:11px;color:var(--t600);margin-left:6px;font-weight:500}
  .chip.active .g{color:#a5b4fc}

  .foot{padding:16px 20px 26px}
  .recent{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:14px 16px;
    display:flex;align-items:center;gap:12px;cursor:pointer}
  .recent:hover{border-color:var(--border2)}
  .recent .ico{width:40px;height:40px;border-radius:12px;background:var(--card2);border:1px solid var(--border);
    display:flex;align-items:center;justify-content:center;color:var(--t400);flex-shrink:0}
  .recent .meta{flex:1;min-width:0}
  .recent .meta .t{font-size:14px;font-weight:600}
  .recent .meta .s{font-size:12px;color:var(--t500);margin-top:2px}
  .recent .chev{color:var(--t600)}
  .foot .barhint{text-align:center;font-size:11px;color:var(--t600);margin-top:14px}
</style>
</head>
<body>
  <main class="phone" data-component-id="recorder-online-idle">
    <div class="statusbar"><span>9:41</span><div class="dots"><span></span><span></span><span></span></div></div>
    <header>
      <div class="brand">
        <div class="logo" aria-hidden="true">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M21 6c-1.6-.4-3.2 0-4.5 1C15 5.3 12.6 4.5 10 5 6 5.7 3 9 3 13c0 3 1.8 5.3 4 6l-1 3 3-1.2c.7.1 1.4.2 2 .2 4.4 0 8-3.1 8-7 0-1 0-1.9-.4-2.7L21 9V6ZM9 12a1.2 1.2 0 1 1 0-2.4A1.2 1.2 0 0 1 9 12Z"/></svg>
        </div>
        <div><h1>Warble</h1><div class="sub">Voice notes, even offline</div></div>
      </div>
      <div class="hgroup">
        <button class="iconbtn" aria-label="Recordings history" data-component-id="history-entry">
          <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.7 9.7 0 0 0-6.7 2.8L3 8"/><path d="M3 4v4h4"/><path d="M12 7v5l3 2"/></svg>
        </button>
      </div>
    </header>

    <div class="badgerow">
      <span class="badge online" data-component-id="status-badge"><span class="dot"></span>Online</span>
    </div>

    <section class="stage">
      <div class="prompt">
        <h2>Tap to speak</h2>
        <p>Talk in English, Hindi or Telugu — your words transcribe live.</p>
      </div>

      <div class="micwrap" data-component-id="mic-button">
        <div class="ring r1"></div><div class="ring r2"></div>
        <button class="mic" aria-label="Start recording">
          <svg width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/></svg>
        </button>
      </div>
      <div class="mic-hint">Press the mic to start</div>

      <div class="langs" data-component-id="language-chips">
        <button class="chip active">English</button>
        <button class="chip">हिन्दी<span class="g">Hindi</span></button>
        <button class="chip">తెలుగు<span class="g">Telugu</span></button>
      </div>
    </section>

    <div class="foot">
      <div class="recent" data-component-id="recent-recording">
        <div class="ico"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
        <div class="meta"><div class="t">Standup notes</div><div class="s">Today · 1:24 · Transcribed</div></div>
        <span class="chev"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m9 18 6-6-6-6"/></svg></span>
      </div>
      <div class="barhint">12 recordings · all synced</div>
    </div>
  </main>
</body>
</html>
