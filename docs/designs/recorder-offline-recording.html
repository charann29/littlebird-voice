<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Warble — Recorder (Offline, Recording)</title>
<meta name="description" content="Recorder while offline and actively recording: running timer, animated waveform, 'Saved locally — will transcribe when online' helper text, and stop button." />
<!-- DESIGN SYSTEM: same tokens. Offline recording = amber accents; no live transcript (transcribes later). -->
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{--bg:#020617;--card:#0f172a;--card2:#111a2e;--border:#1e293b;--border2:#334155;
    --indigo:#4f46e5;--indigo-hi:#6366f1;--green:#22c55e;--green-d:#4ade80;--yellow:#eab308;--red:#ef4444;
    --amber:#f59e0b;--amber-d:#fbbf24;--white:#f8fafc;--t300:#cbd5e1;--t400:#94a3b8;--t500:#64748b;--t600:#475569}
  html,body{height:100%}
  body{background:radial-gradient(120% 80% at 50% -10%,#0b1220 0%,var(--bg) 60%);font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,sans-serif;color:var(--white);display:flex;align-items:center;justify-content:center;min-height:100vh;padding:32px 16px;-webkit-font-smoothing:antialiased}
  .phone{width:100%;max-width:400px;min-height:800px;background:var(--bg);border:1px solid var(--border);border-radius:32px;overflow:hidden;box-shadow:0 40px 80px -20px rgba(0,0,0,.7);display:flex;flex-direction:column}
  .statusbar{display:flex;justify-content:space-between;align-items:center;padding:14px 22px 6px;font-size:12px;color:var(--t400);font-weight:600}
  .statusbar .dots{display:flex;gap:4px;align-items:center}.statusbar .dots span{width:4px;height:4px;border-radius:50%;background:var(--t500)}
  header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 6px}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .logo{width:34px;height:34px;border-radius:11px;background:linear-gradient(150deg,var(--indigo),#7c3aed);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px -6px rgba(79,70,229,.7)}
  .brand h1{font-size:17px;font-weight:700;letter-spacing:-.02em}.brand .sub{font-size:11px;color:var(--t500);margin-top:1px;font-weight:500}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:999px;font-size:12px;font-weight:600;border:1px solid}
  .badge.offline{color:var(--amber-d);background:rgba(245,158,11,.10);border-color:rgba(245,158,11,.32)}
  .badge.offline .dot{width:7px;height:7px;border-radius:50%;background:var(--amber)}

  .stage{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:20px 24px;gap:28px}
  .rec-indic{display:flex;align-items:center;gap:8px;font-size:13px;font-weight:700;color:var(--amber-d)}
  .rec-indic .rd{width:9px;height:9px;border-radius:50%;background:var(--red);animation:blink 1.1s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}
  .timer{font-size:52px;font-weight:700;letter-spacing:-.02em;font-variant-numeric:tabular-nums;color:var(--white)}

  .wave{width:100%;height:120px;display:flex;align-items:center;justify-content:center;gap:4px}
  .wave i{width:4px;border-radius:3px;background:linear-gradient(var(--amber-d),var(--amber));animation:bar 1.1s ease-in-out infinite}
  @keyframes bar{0%,100%{height:10%}50%{height:100%}}

  .savedchip{display:flex;align-items:center;gap:9px;padding:11px 16px;border-radius:14px;background:rgba(245,158,11,.09);border:1px solid rgba(245,158,11,.26);font-size:13px;font-weight:600;color:#fcd9a4}
  .savedchip .ic{color:var(--amber-d)}

  .controls{padding:18px 20px 34px;display:flex;align-items:center;justify-content:center;gap:22px}
  .roundbtn{width:56px;height:56px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--t400);display:flex;align-items:center;justify-content:center;cursor:pointer}
  .stopbtn{width:80px;height:80px;border-radius:50%;border:none;cursor:pointer;color:#fff;background:linear-gradient(160deg,#f87171,var(--red));display:flex;align-items:center;justify-content:center;box-shadow:0 16px 40px -8px rgba(239,68,68,.6),inset 0 1px 0 rgba(255,255,255,.25);position:relative}
  .stopbtn::after{content:"";position:absolute;inset:-10px;border-radius:50%;border:2px solid rgba(239,68,68,.3);animation:ring 1.6s infinite}
  @keyframes ring{0%{transform:scale(.85);opacity:.8}100%{transform:scale(1.25);opacity:0}}
  .stopglyph{width:26px;height:26px;border-radius:6px;background:#fff}
  .subhint{text-align:center;font-size:11px;color:var(--t600);padding:0 20px 24px}
</style>
</head>
<body>
  <main class="phone" data-component-id="recorder-offline-recording">
    <div class="statusbar"><span>9:41</span><div class="dots"><span></span><span></span><span></span></div></div>
    <header>
      <div class="brand">
        <div class="logo" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M21 6c-1.6-.4-3.2 0-4.5 1C15 5.3 12.6 4.5 10 5 6 5.7 3 9 3 13c0 3 1.8 5.3 4 6l-1 3 3-1.2c.7.1 1.4.2 2 .2 4.4 0 8-3.1 8-7 0-1 0-1.9-.4-2.7L21 9V6ZM9 12a1.2 1.2 0 1 1 0-2.4A1.2 1.2 0 0 1 9 12Z"/></svg></div>
        <div><h1>Warble</h1><div class="sub">Recording offline</div></div>
      </div>
      <span class="badge offline"><span class="dot"></span>Offline</span>
    </header>

    <section class="stage">
      <div class="rec-indic" data-component-id="recording-indicator"><span class="rd"></span>REC · English</div>
      <div class="timer" data-component-id="recording-timer">01:32</div>

      <div class="wave" data-component-id="waveform" aria-hidden="true">
        <i style="height:24%;animation-delay:0s"></i><i style="height:66%;animation-delay:.12s"></i><i style="height:40%;animation-delay:.22s"></i><i style="height:88%;animation-delay:.06s"></i><i style="height:56%;animation-delay:.26s"></i><i style="height:100%;animation-delay:.16s"></i><i style="height:34%;animation-delay:.31s"></i><i style="height:72%;animation-delay:.09s"></i><i style="height:50%;animation-delay:.23s"></i><i style="height:92%;animation-delay:.13s"></i><i style="height:30%;animation-delay:.29s"></i><i style="height:78%;animation-delay:.05s"></i><i style="height:46%;animation-delay:.19s"></i><i style="height:84%;animation-delay:.27s"></i><i style="height:38%;animation-delay:.11s"></i><i style="height:64%;animation-delay:.21s"></i><i style="height:100%;animation-delay:.07s"></i><i style="height:32%;animation-delay:.3s"></i><i style="height:70%;animation-delay:.15s"></i><i style="height:52%;animation-delay:.25s"></i><i style="height:90%;animation-delay:.1s"></i><i style="height:40%;animation-delay:.2s"></i>
      </div>

      <div class="savedchip" data-component-id="saved-locally-helper">
        <span class="ic"><svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M19 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11l5 5v11a2 2 0 0 1-2 2Z"/><path d="M17 21v-8H7v8"/><path d="M7 3v5h8"/></svg></span>
        Saved locally — will transcribe when online
      </div>
    </section>

    <div class="controls">
      <button class="roundbtn" aria-label="Pause"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/></svg></button>
      <button class="stopbtn" aria-label="Stop recording" data-component-id="stop-button"><span class="stopglyph"></span></button>
      <button class="roundbtn" aria-label="Discard"><svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 14h10l1-14"/></svg></button>
    </div>
    <div class="subhint">Audio is stored on this device only until it syncs.</div>
  </main>
</body>
</html>
