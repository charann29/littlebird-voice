<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Warble — Recorder (Online, Live Listening)</title>
<meta name="description" content="Main recorder while online and actively listening: animated waveform, live interim transcript streaming into an editable text area, Listening indicator, and stop button." />
<!-- DESIGN SYSTEM: identical tokens to recorder-online-idle.html. Listening = green-500 accents. -->
<style>
  *{box-sizing:border-box;margin:0;padding:0}
  :root{
    --bg:#020617;--card:#0f172a;--card2:#111a2e;--border:#1e293b;--border2:#334155;
    --indigo:#4f46e5;--indigo-hi:#6366f1;--green:#22c55e;--green-d:#4ade80;
    --yellow:#eab308;--red:#ef4444;--amber:#f59e0b;
    --white:#f8fafc;--t300:#cbd5e1;--t400:#94a3b8;--t500:#64748b;--t600:#475569;
  }
  html,body{height:100%}
  body{background:radial-gradient(120% 80% at 50% -10%,#0b1220 0%,var(--bg) 60%);
    font-family:system-ui,-apple-system,"Segoe UI",Roboto,Inter,sans-serif;color:var(--white);
    display:flex;align-items:center;justify-content:center;min-height:100vh;padding:32px 16px;-webkit-font-smoothing:antialiased}
  .phone{width:100%;max-width:400px;min-height:800px;background:var(--bg);border:1px solid var(--border);
    border-radius:32px;overflow:hidden;box-shadow:0 40px 80px -20px rgba(0,0,0,.7);display:flex;flex-direction:column}
  .statusbar{display:flex;justify-content:space-between;align-items:center;padding:14px 22px 6px;font-size:12px;color:var(--t400);font-weight:600}
  .statusbar .dots{display:flex;gap:4px;align-items:center}.statusbar .dots span{width:4px;height:4px;border-radius:50%;background:var(--t500)}
  header{display:flex;align-items:center;justify-content:space-between;padding:12px 20px 6px}
  .brand{display:flex;align-items:center;gap:10px}
  .brand .logo{width:34px;height:34px;border-radius:11px;background:linear-gradient(150deg,var(--indigo),#7c3aed);display:flex;align-items:center;justify-content:center;box-shadow:0 6px 16px -6px rgba(79,70,229,.7)}
  .brand h1{font-size:17px;font-weight:700;letter-spacing:-.02em}.brand .sub{font-size:11px;color:var(--t500);margin-top:1px;font-weight:500}
  .badge{display:inline-flex;align-items:center;gap:6px;padding:6px 11px;border-radius:999px;font-size:12px;font-weight:600;border:1px solid}
  .badge.online{color:var(--green-d);background:rgba(34,197,94,.10);border-color:rgba(34,197,94,.30)}
  .badge .dot{width:7px;height:7px;border-radius:50%;background:var(--green)}
  .badgerow{padding:6px 20px 0;display:flex;justify-content:center}

  .stage{flex:1;display:flex;flex-direction:column;padding:16px 20px 0;gap:14px}
  .listening{display:flex;align-items:center;justify-content:center;gap:9px;color:var(--green-d);font-size:13px;font-weight:600}
  .listening .ldot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:blink 1.1s infinite}
  @keyframes blink{0%,100%{opacity:1}50%{opacity:.25}}
  .timer{font-variant-numeric:tabular-nums;color:var(--t400)}

  /* live transcript editable area */
  .transcript{flex:1;background:var(--card);border:2px solid rgba(34,197,94,.55);border-radius:20px;
    box-shadow:0 0 30px rgba(34,197,94,.12);padding:18px;overflow:hidden;display:flex;flex-direction:column;gap:8px;position:relative}
  .transcript .label{font-size:11px;text-transform:uppercase;letter-spacing:.08em;color:var(--t500);font-weight:700}
  .final{font-size:16px;line-height:1.6;color:var(--white)}
  .interim{font-size:16px;line-height:1.6;color:var(--t400);font-style:italic}
  .caret{display:inline-block;width:2px;height:1.05em;background:var(--green);vertical-align:-2px;margin-left:2px;animation:blink .9s step-end infinite}
  .edithint{position:absolute;bottom:14px;right:16px;font-size:11px;color:var(--t600);display:flex;align-items:center;gap:5px}

  /* waveform */
  .wave{height:64px;display:flex;align-items:center;justify-content:center;gap:3px;padding:0 6px}
  .wave i{width:3px;border-radius:2px;background:linear-gradient(var(--green-d),var(--green));animation:bar 1s ease-in-out infinite}
  @keyframes bar{0%,100%{height:12%}50%{height:100%}}

  .controls{padding:18px 20px 30px;display:flex;align-items:center;justify-content:center;gap:20px}
  .roundbtn{width:56px;height:56px;border-radius:50%;border:1px solid var(--border);background:var(--card);color:var(--t400);display:flex;align-items:center;justify-content:center;cursor:pointer}
  .roundbtn:hover{border-color:var(--border2);color:var(--t300)}
  .stopbtn{width:80px;height:80px;border-radius:50%;border:none;cursor:pointer;color:#fff;
    background:linear-gradient(160deg,#f87171,var(--red));display:flex;align-items:center;justify-content:center;
    box-shadow:0 16px 40px -8px rgba(239,68,68,.65),inset 0 1px 0 rgba(255,255,255,.25);position:relative}
  .stopbtn::after{content:"";position:absolute;inset:-10px;border-radius:50%;border:2px solid rgba(239,68,68,.3);animation:ring 1.6s infinite}
  @keyframes ring{0%{transform:scale(.85);opacity:.8}100%{transform:scale(1.25);opacity:0}}
  .stopglyph{width:26px;height:26px;border-radius:6px;background:#fff}
</style>
</head>
<body>
  <main class="phone" data-component-id="recorder-online-listening">
    <div class="statusbar"><span>9:41</span><div class="dots"><span></span><span></span><span></span></div></div>
    <header>
      <div class="brand">
        <div class="logo" aria-hidden="true"><svg width="20" height="20" viewBox="0 0 24 24" fill="#fff"><path d="M21 6c-1.6-.4-3.2 0-4.5 1C15 5.3 12.6 4.5 10 5 6 5.7 3 9 3 13c0 3 1.8 5.3 4 6l-1 3 3-1.2c.7.1 1.4.2 2 .2 4.4 0 8-3.1 8-7 0-1 0-1.9-.4-2.7L21 9V6ZM9 12a1.2 1.2 0 1 1 0-2.4A1.2 1.2 0 0 1 9 12Z"/></svg></div>
        <div><h1>Warble</h1><div class="sub">Recording…</div></div>
      </div>
      <span class="badge online"><span class="dot"></span>Online</span>
    </header>

    <div class="badgerow"><div class="listening" data-component-id="listening-indicator"><span class="ldot"></span>Listening&nbsp;·&nbsp;<span class="timer">00:18</span></div></div>

    <section class="stage">
      <div class="transcript" data-component-id="live-transcript" contenteditable="false">
        <div class="label">Live transcript · English</div>
        <div>
          <span class="final">Let's ship the offline recorder this sprint. First we cache the audio locally, then</span>
          <span class="interim"> we sync and transcribe as soon as the network comes back<span class="caret"></span></span>
        </div>
        <div class="edithint"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M17 3a2.8 2.8 0 0 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/></svg>Tap to edit</div>
      </div>

      <div class="wave" data-component-id="waveform" aria-hidden="true">
        <i style="height:30%;animation-delay:0s"></i><i style="height:70%;animation-delay:.1s"></i><i style="height:45%;animation-delay:.2s"></i><i style="height:90%;animation-delay:.05s"></i><i style="height:60%;animation-delay:.25s"></i><i style="height:100%;animation-delay:.15s"></i><i style="height:40%;animation-delay:.3s"></i><i style="height:75%;animation-delay:.08s"></i><i style="height:55%;animation-delay:.22s"></i><i style="height:95%;animation-delay:.12s"></i><i style="height:35%;animation-delay:.28s"></i><i style="height:80%;animation-delay:.04s"></i><i style="height:50%;animation-delay:.18s"></i><i style="height:88%;animation-delay:.26s"></i><i style="height:42%;animation-delay:.1s"></i><i style="height:68%;animation-delay:.2s"></i><i style="height:100%;animation-delay:.06s"></i><i style="height:38%;animation-delay:.3s"></i><i style="height:72%;animation-delay:.14s"></i><i style="height:58%;animation-delay:.24s"></i><i style="height:92%;animation-delay:.09s"></i><i style="height:44%;animation-delay:.19s"></i><i style="height:78%;animation-delay:.27s"></i><i style="height:52%;animation-delay:.11s"></i>
      </div>
    </section>

    <div class="controls">
      <button class="roundbtn" aria-label="Restart" data-component-id="restart-button">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.7 9.7 0 0 0-6.7 2.8L3 8"/><path d="M3 4v4h4"/></svg>
      </button>
      <button class="stopbtn" aria-label="Stop recording" data-component-id="stop-button"><span class="stopglyph"></span></button>
      <button class="roundbtn" aria-label="Discard" data-component-id="discard-button">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6h18"/><path d="M8 6V4h8v2"/><path d="M6 6l1 14h10l1-14"/></svg>
      </button>
    </div>
  </main>
</body>
</html>
